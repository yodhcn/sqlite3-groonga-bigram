name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sqlite_version:
        description: "SQLite version (e.g., 3510300)"
        required: false
        default: ""
        type: string
      groonga_version:
        description: "Groonga version (e.g., 16.0.1-1)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run setup.sh
        run: |
          chmod +x setup.sh
          if [ -n "${{ github.event.inputs.sqlite_version }}" ]; then
            export SQLITE_VERSION="${{ github.event.inputs.sqlite_version }}"
          fi
          if [ -n "${{ github.event.inputs.groonga_version }}" ]; then
            export GROONGA_VERSION="${{ github.event.inputs.groonga_version }}"
          fi
          ./setup.sh

      - name: Run test.sh
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Run make
        run: |
          make extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbigram
          path: libbigram.so

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: libbigram.so
          generate_release_notes: true
